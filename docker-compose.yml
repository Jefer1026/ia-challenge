services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - .n8n/n8n_data:/home/node/.n8n
      - ./workflows:/home/node/workflows
    environment:
      - N8N_DEFAULT_FLOWS_PATH=/home/node/workflows
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
    networks:
      - ai-network
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0 
    volumes:
      - ./n8n/ollama_data:/root/.ollama
      - ./n8n/init-ollama.sh:/init-ollama.sh # Montamos el script
    entrypoint: ["/bin/bash", "/init-ollama.sh"]
    networks:
      - ai-network
    restart: always

  python-agent:
    build: 
      context: ./agent
      dockerfile: Dockerfile
    ports:
      - "8000:8000"      
    container_name: python-agent
    volumes:
      - ./agent:/app        # Mapeo de desarrollo
      - ./agent/documents:/app/documents
      - ./agent/chroma_db:/app/chroma_db
    networks:
      - ai-network
    depends_on:
      - ollama

    
networks:
  ai-network:
    driver: bridge
    